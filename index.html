<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING PONG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .scoreboard {
            display: flex;
            gap: 120px;
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 10px #fff;
            letter-spacing: 8px;
        }

        .score {
            min-width: 60px;
            text-align: center;
        }

        #gameCanvas {
            border: 4px solid #fff;
            image-rendering: pixelated;
        }

        .power-display {
            color: #ff0;
            font-size: 14px;
            text-shadow: 0 0 8px #ff0;
            height: 20px;
        }

        .instructions {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <span id="playerScore" class="score">0</span>
            <span id="aiScore" class="score">0</span>
        </div>
        <canvas id="gameCanvas" width="640" height="400"></canvas>
        <div class="power-display" id="powerDisplay"></div>
        <div class="instructions">FIRST TO 7 WINS</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerScoreEl = document.getElementById('playerScore');
        const aiScoreEl = document.getElementById('aiScore');
        const powerDisplay = document.getElementById('powerDisplay');

        const W = canvas.width;
        const H = canvas.height;

        const PADDLE_W = 12;
        const PADDLE_H = 60;
        const BALL_SIZE = 8;
        const WINNING_SCORE = 7;

        const POWER_COMBOS = [
            { keys: ['Z', 'X'], label: 'Z+X = 2X SPEED', color: '#0ff', multiplier: 2 },
            { keys: ['A', 'S'], label: 'A+S = 3X SPEED', color: '#f0f', multiplier: 3 },
            { keys: ['Q', 'W'], label: 'Q+W = 4X SPEED', color: '#ff0', multiplier: 4 }
        ];

        const CURVE_COMBO = { keys: ['J', 'K'], label: 'J+K = CURVE BALL', color: '#0f0' };

        const COMBO_WINDOW = 400;
        const POWER_DURATION = 800;
        const CURVE_DURATION = 600;

        let playerY = H / 2 - PADDLE_H / 2;
        let aiY = H / 2 - PADDLE_H / 2;
        let ballX = W / 2;
        let ballY = H / 2;
        let ballVX = 4;
        let ballVY = 2;
        let ballCurve = 0;
        let playerScore = 0;
        let aiScore = 0;
        let gameRunning = false;
        let gameOver = false;
        let paused = false;
        let mouseY = H / 2;

        let keyPresses = [];
        let powerUpActive = false;
        let powerMultiplier = 1;
        let powerEndTime = 0;
        let curveActive = false;
        let curveEndTime = 0;
        let curveDirection = 0;

        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (!keysDown[key]) {
                keysDown[key] = true;
                keyPresses.push({ key, time: Date.now() });
            }
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                } else {
                    paused = !paused;
                }
            }
            if (e.code === 'Enter' && !gameRunning && !gameOver) {
                startGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toUpperCase();
            keysDown[key] = false;
        });

        const keysDown = {};

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameOver) {
                resetGame();
            }
        });

        function checkCombos() {
            const now = Date.now();
            keyPresses = keyPresses.filter(k => now - k.time < COMBO_WINDOW);

            for (const combo of POWER_COMBOS) {
                const hasKeys = combo.keys.every(k => keyPresses.some(p => p.key === k && now - p.time < COMBO_WINDOW));
                if (hasKeys) {
                    powerUpActive = true;
                    powerMultiplier = combo.multiplier;
                    powerEndTime = now + POWER_DURATION;
                    keyPresses = keyPresses.filter(p => !combo.keys.includes(p.key));
                    return;
                }
            }

            const curveKeys = CURVE_COMBO.keys.every(k => 
                keyPresses.some(p => p.key === k && now - p.time < COMBO_WINDOW)
            );
            if (curveKeys) {
                curveActive = true;
                curveDirection = keysDown['J'] ? 1 : (keysDown['K'] ? -1 : (Math.random() > 0.5 ? 1 : -1));
                curveEndTime = now + CURVE_DURATION;
                keyPresses = keyPresses.filter(p => !CURVE_COMBO.keys.includes(p.key));
            }
        }

        function updatePowerDisplay() {
            let text = '';
            if (powerUpActive) {
                if (Date.now() > powerEndTime) {
                    powerUpActive = false;
                    powerMultiplier = 1;
                } else {
                    const remaining = Math.ceil((powerEndTime - Date.now()) / 1000 * 10) / 10;
                    text = `>>> ${powerMultiplier}X POWER SHOT! ${remaining.toFixed(1)}s <<<`;
                }
            }
            if (curveActive) {
                if (Date.now() > curveEndTime) {
                    curveActive = false;
                    ballCurve = 0;
                } else {
                    text += (text ? ' | ' : '') + '*** CURVE BALL ACTIVE ***';
                }
            }
            powerDisplay.textContent = text;
            powerDisplay.style.color = powerUpActive ? '#ff0' : (curveActive ? '#0f0' : '#ff0');
        }

        function startGame() {
            gameRunning = true;
            gameLoop();
        }

        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            playerScoreEl.textContent = '0';
            aiScoreEl.textContent = '0';
            resetBall();
            gameOver = false;
            powerUpActive = false;
            curveActive = false;
            powerMultiplier = 1;
            ballCurve = 0;
            powerDisplay.textContent = '';
            gameRunning = true;
            gameLoop();
        }

        function resetBall() {
            ballX = W / 2;
            ballY = H / 2;
            ballVX = (Math.random() > 0.5 ? 1 : -1) * 4;
            ballVY = (Math.random() - 0.5) * 3;
            ballCurve = 0;
        }

        function update() {
            if (paused || gameOver) return;

            playerY = mouseY - PADDLE_H / 2;
            playerY = Math.max(0, Math.min(H - PADDLE_H, playerY));

            const aiCenter = aiY + PADDLE_H / 2;
            const aiSpeed = 3.5;
            if (aiCenter < ballY - 20) {
                aiY += aiSpeed;
            } else if (aiCenter > ballY + 20) {
                aiY -= aiSpeed;
            }
            aiY = Math.max(0, Math.min(H - PADDLE_H, aiY));

            if (curveActive && ballVX > 0) {
                const curveStrength = (curveEndTime - Date.now()) / CURVE_DURATION * 0.3;
                ballCurve = curveDirection * curveStrength;
            } else {
                ballCurve *= 0.9;
            }

            ballX += ballVX;
            ballY += ballVY + ballCurve;

            if (ballY - BALL_SIZE <= 0 || ballY + BALL_SIZE >= H) {
                ballVY *= -1;
                ballY = ballY < H / 2 ? BALL_SIZE : H - BALL_SIZE;
            }

            if (ballX - BALL_SIZE <= 40) {
                if (ballY > playerY && ballY < playerY + PADDLE_H) {
                    const hitPos = (ballY - playerY) / PADDLE_H;
                    const angle = (hitPos - 0.5) * Math.PI / 2.5;
                    let speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
                    
                    if (powerUpActive) {
                        speed *= powerMultiplier;
                        powerUpActive = false;
                        powerMultiplier = 1;
                        powerDisplay.textContent = '';
                    } else {
                        speed = Math.min(speed * 1.05, 10);
                    }
                    
                    ballVX = Math.abs(Math.cos(angle) * speed);
                    ballVY = Math.sin(angle) * speed;
                    ballX = 40 + BALL_SIZE;
                }
            }

            if (ballX + BALL_SIZE >= W - 40) {
                if (ballY > aiY && ballY < aiY + PADDLE_H) {
                    const hitPos = (ballY - aiY) / PADDLE_H;
                    const angle = (hitPos - 0.5) * Math.PI / 2.5;
                    let speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
                    speed = Math.min(speed * 1.05, 10);
                    ballVX = -Math.abs(Math.cos(angle) * speed);
                    ballVY = Math.sin(angle) * speed;
                    ballX = W - 40 - BALL_SIZE;
                }
            }

            if (ballX < 0) {
                aiScore++;
                aiScoreEl.textContent = aiScore;
                checkWin();
                if (!gameOver) resetBall();
            }
            if (ballX > W) {
                playerScore++;
                playerScoreEl.textContent = playerScore;
                checkWin();
                if (!gameOver) resetBall();
            }

            checkCombos();
            updatePowerDisplay();
        }

        function checkWin() {
            if (playerScore >= WINNING_SCORE || aiScore >= WINNING_SCORE) {
                gameOver = true;
                gameRunning = false;
            }
        }

        function drawAtariRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
        }

        function drawAtariText(text, x, y, size, color) {
            ctx.fillStyle = color;
            ctx.font = `${size}px "Courier New", monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(text, x, y);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 10]);
            ctx.beginPath();
            ctx.moveTo(W / 2, 0);
            ctx.lineTo(W / 2, H);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, W, 4);
            ctx.fillRect(0, H - 4, W, 4);
            ctx.fillRect(0, 0, 4, H);
            ctx.fillRect(W - 4, 0, 4, H);

            drawAtariRect(20, playerY, PADDLE_W, PADDLE_H, '#fff');
            drawAtariRect(24, playerY + 5, 4, PADDLE_H - 10, '#0f0');

            drawAtariRect(W - 32, aiY, PADDLE_W, PADDLE_H, '#fff');
            drawAtariRect(W - 28, aiY + 5, 4, PADDLE_H - 10, '#f00');

            let ballColor = '#fff';
            if (powerUpActive) ballColor = '#ff0';
            else if (curveActive) ballColor = '#0f0';

            if (powerUpActive || curveActive) {
                const trailCount = powerUpActive ? 3 : 2;
                for (let i = trailCount; i > 0; i--) {
                    const alpha = 1 - (i / (trailCount + 1));
                    ctx.globalAlpha = alpha * 0.5;
                    drawAtariRect(
                        ballX - BALL_SIZE / 2 - ballVX * i * 0.5,
                        ballY - BALL_SIZE / 2 - ballVY * i * 0.5,
                        BALL_SIZE - i,
                        BALL_SIZE - i,
                        ballColor
                    );
                }
                ctx.globalAlpha = 1;
            }
            drawAtariRect(ballX - BALL_SIZE / 2, ballY - BALL_SIZE / 2, BALL_SIZE, BALL_SIZE, ballColor);

            if (paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, W, H);
                drawAtariText('PAUSED', W / 2, H / 2, 32, '#0f0');
                drawAtariText('PRESS SPACE', W / 2, H / 2 + 40, 16, '#0f0');
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, W, H);
                const winner = playerScore >= WINNING_SCORE ? 'YOU WIN!' : 'AI WINS!';
                const winColor = playerScore >= WINNING_SCORE ? '#0f0' : '#f00';
                drawAtariText(winner, W / 2, H / 2 - 20, 32, winColor);
                drawAtariText('CLICK TO PLAY AGAIN', W / 2, H / 2 + 30, 14, '#fff');
            }

            if (!gameRunning && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, W, H);
                drawAtariText('PING PONG', W / 2, H / 2 - 60, 36, '#fff');
                
                let yPos = H / 2 - 10;
                drawAtariText('MOVE MOUSE TO CONTROL PADDLE', W / 2, yPos, 12, '#0f0');
                yPos += 30;
                drawAtariText('POWER SHOTS:', W / 2, yPos, 12, '#ff0');
                yPos += 20;
                for (const combo of POWER_COMBOS) {
                    drawAtariText(combo.label, W / 2, yPos, 13, combo.color);
                    yPos += 16;
                }
                yPos += 10;
                drawAtariText(CURVE_COMBO.label, W / 2, yPos, 13, CURVE_COMBO.color);
                yPos += 30;
                drawAtariText('CLICK OR ENTER TO START', W / 2, yPos, 14, '#fff');
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        draw();
    </script>
</body>
</html>
